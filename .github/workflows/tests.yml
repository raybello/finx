name: Tests

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

jobs:
  test:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          submodules: recursive

      - name: Install dependencies
        run: |
          sudo apt-get update -y
          sudo apt-get install -y libgtest-dev libcurl4-openssl-dev

      - name: Download project deps
        run: make deps

      - name: Build and run tests
        run: make test

  test-yfinance:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          submodules: recursive

      - name: Install system dependencies
        run: |
          sudo apt-get update -y
          sudo apt-get install -y libgtest-dev python3-dev python3-pip

      - name: Install Python packages
        run: python3 -m pip install pybind11 yfinance

      - name: Download project deps
        run: make deps

      - name: Build and run yfinance integration tests
        run: make test-yfinance
